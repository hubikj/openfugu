name: Android

# Compile check plus the unit-test suite (detectors, exercises, game math,
# session serialization) on every push and pull request.
on:
  push:
    branches: [main, 'kmp-*']
    paths-ignore: ['**.md']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # JVM-only APIs compile fine for Android (java.lang is implicitly
      # visible) but break Kotlin/Native, and Apple targets only compile in
      # the slow macOS job — catch the common slips here first.
      - name: Check commonMain for JVM-only APIs
        run: |
          hits=$(grep -rnE '\bjava\.|\bMath\.|System\.currentTimeMillis|String\.format|Dispatchers\.IO|nativeCanvas' \
            shared/src/commonMain --include='*.kt' \
            | grep -vE '^[^:]+:[0-9]+:\s*(//|\*)' || true)  # comments may mention the APIs
          if [ -n "$hits" ]; then
            echo "$hits"
            echo '::error::JVM-only API in commonMain — see module rule in CLAUDE.md (use util/ helpers, kotlin.math, kotlin.random, IoDispatcher)'
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Install exact SDK packages
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36.1" "build-tools;36.1.0" > /dev/null

      - name: Compile
        run: ./gradlew compileDebugKotlin

      - name: Unit tests
        run: ./gradlew :shared:allTests
